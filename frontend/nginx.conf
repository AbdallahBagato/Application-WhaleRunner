upstream flask_api {
    server api:5000;               # Flask container name : gunicorn port
}

server {
    listen 8080;                   # 8080 -> works as NON-ROOT (nginx-unprivileged);
    server_name _;                 # use 80 only if running the root nginx image

    root  /usr/share/nginx/html;   # index.html, style.css, game.js live here
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # static game files; long cache for css/js, no cache for html
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> Flask (keep the /api prefix, Flask routes are /api/...)
    location /api/ {
        proxy_pass         http://flask_api;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # health endpoint for your container HEALTHCHECK
    location = /healthz {
        return 200 '{"status":"ok","tier":"nginx-frontend"}';
        add_header Content-Type application/json;
    }
}